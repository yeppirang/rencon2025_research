    <style>
        :root {
            --notion-text: #37352f;
            --notion-bg: #ffffff;
            --notion-border: #e9e9e7;
            --notion-tag-bg: #f1f1ef;
            --notion-audio-bg: #f7f7f5;
            --accent: #2383e2;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, "Apple Color Emoji", Arial, sans-serif, "Segoe UI Emoji", "Segoe UI Symbol";
            color: var(--notion-text);
            background-color: var(--notion-bg);
            line-height: 1.6;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            max-width: 800px;
            width: 100%;
        }

        header {
            margin-bottom: 48px;
            border-bottom: 1px solid var(--notion-border);
            padding-bottom: 20px;
        }

        h1 {
            font-size: 2.5rem;
            margin: 0 0 10px 0;
            font-weight: 700;
        }

        .description-top {
            color: #666;
            font-size: 1.1rem;
        }

        section {
            margin-bottom: 60px;
        }

        .model-card {
            border: 1px solid var(--notion-border);
            border-radius: 8px;
            padding: 24px;
            margin-bottom: 30px;
            transition: background 0.2s ease;
        }

        .model-card:hover {
            background-color: #fafafa;
        }

        h2 {
            font-size: 1.8rem;
            margin: 0 0 12px 0;
            display: flex;
            align-items: center;
        }

        .model-description {
            font-size: 1rem;
            margin-bottom: 16px;
            color: #37352f;
        }

        .tags {
            margin-bottom: 20px;
        }

        .tag {
            background: var(--notion-tag-bg);
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.85rem;
            color: #666;
            margin-right: 6px;
            display: inline-block;
        }

        .track-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .track-item {
            padding: 12px 0;
            border-top: 1px solid var(--notion-border);
        }

        .track-name {
            font-weight: 600;
            font-size: 0.95rem;
            margin-bottom: 8px;
            display: block;
        }

        audio {
            width: 100%;
            height: 36px;
            outline: none;
        }

        /* 노션 느낌의 아이콘 */
        .icon {
            margin-right: 12px;
            font-size: 1.5rem;
        }

        @media (max-width: 600px) {
            h1 { font-size: 1.8rem; }
            body { padding: 20px 15px; }
        }
    </style>
</head>

            </li>
        `).join('');

            <ul class="track-list">
